<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Thalappanth - Settings</title>
    <style>
        * { box-sizing: border-box; font-family: 'Arial Black', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; color: white; 
        }

        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: url('home-bg.jpg') no-repeat center center;
            background-size: cover; z-index: -1; 
            filter: blur(10px) brightness(0.3);
        }

        .container {
            width: 100%; height: 100%; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
        }

        .settings-card {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #f1c40f;
            border-radius: 15px;
            padding: 20px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.2);
        }

        h1 { 
            text-align: center; color: #f1c40f; margin: 0 0 20px 0; 
            text-transform: uppercase; font-size: 22px;
        }

        .row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid #333;
        }

        .label { font-size: 16px; font-weight: bold; }

        .btn-toggle {
            background: #27ae60; color: white; border: none;
            padding: 6px 15px; border-radius: 8px; cursor: pointer;
            font-weight: bold; width: 70px; font-size: 12px;
        }

        .btn-toggle.off { background: #c0392b; }

        .btn-action {
            background: #2d3436; color: white; border: 1px solid #444;
            padding: 6px 15px; border-radius: 8px; cursor: pointer;
            font-weight: bold; font-size: 12px;
        }

        .footer { margin-top: 20px; }

        .btn-back {
            background: #d63031; color: white; border: none;
            padding: 10px; border-radius: 10px; width: 100%;
            font-size: 18px; font-weight: 900; cursor: pointer;
            box-shadow: 0 4px 0 #962d22; text-transform: uppercase;
        }

        .btn-back:active { transform: translateY(2px); box-shadow: 0 2px 0 #962d22; }

    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="container">
        <div class="settings-card">
            <h1>Settings</h1>

            <div class="row">
                <span class="label">MUSIC</span>
                <button class="btn-toggle" onclick="toggleBtn(this)">ON</button>
            </div>

            <div class="row">
                <span class="label">SOUNDS</span>
                <button class="btn-toggle" onclick="toggleBtn(this)">ON</button>
            </div>

            <div class="row">
                <span class="label">CONTROLS</span>
                <button class="btn-action" onclick="alert('Control Settings coming soon!')">EDIT</button>
            </div>

            <div class="row" style="border-bottom: none;">
                <span class="label">ACCOUNT</span>
                <button class="btn-action" onclick="alert('Login system coming soon!')" style="background: #2980b9;">LOGIN</button>
            </div>

            <div class="footer">
                <button class="btn-back" onclick="window.location.href='home.html'">BACK</button>
            </div>
        </div>
    </div>

    <script>
        function toggleBtn(btn) {
            if (btn.innerText === "ON") {
                btn.innerText = "OFF";
                btn.classList.add("off");
            } else {
                btn.innerText = "ON";
                btn.classList.remove("off");
            }
        }

        // Fullscreen activation
        document.addEventListener('click', function() {
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
        }, { once: true });
    </script>
</body>
</html>
