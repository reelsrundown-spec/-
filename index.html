<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Thalappanth - Loading</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #0d1b2a;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        #loading-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, #1b263b, #0d1b2a);
            z-index: -1;
        }

        #loading-container { text-align: center; color: white; }
        .logo {
            font-size: 50px; font-weight: 900; color: #f1c40f;
            text-shadow: 0 0 20px rgba(241, 196, 15, 0.5);
            margin-bottom: 20px; letter-spacing: 10px;
        }

        .progress-box {
            width: 280px; height: 8px; background: rgba(255,255,255,0.1);
            border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2);
            margin: 0 auto;
        }

        #prograss-bar {
            width: 0%; height: 100%; background: linear-gradient(90deg, #f1c40f, #e67e22);
            box-shadow: 0 0 10px #f1c40f; transition: 0.1s;
        }

        #status { margin-top: 15px; font-size: 12px; letter-spacing: 2px; color: #bdc3c7; }
        
        #tap-msg {
            display: none; margin-top: 20px; font-size: 22px; font-weight: bold;
            color: #fff; animation: blink 1.2s infinite; cursor: pointer;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <audio id="bgm" loop>
        <source src="music/game1.bgm.mp3" type="audio/mpeg">
    </audio>

    <div id="loading-bg"></div>
    <div id="loading-container">
        <div class="logo">THALAPANTH</div>
        <div id="loader-section">
            <div class="progress-box"><div id="prograss-bar"></div></div>
            <p id="status">LOADING... 0%</p>
        </div>
        <div id="tap-msg">TAP TO START</div>
    </div>

    <script>
        const progressBar = document.getElementById('prograss-bar');
        const statusText = document.getElementById('status');
        const loaderSection = document.getElementById('loader-section');
        const tapMsg = document.getElementById('tap-msg');
        const bgm = document.getElementById('bgm');

        let width = 0;
        const loadingInterval = setInterval(() => {
            if (width >= 100) {
                clearInterval(loadingInterval);
                loaderSection.style.display = 'none';
                tapMsg.style.display = 'block';

                document.body.onclick = () => {
                    // Play music
                    bgm.play().catch(e => console.log("Audio blocked"));

                    // Enter Fullscreen
                    const elem = document.documentElement;
                    if (elem.requestFullscreen) elem.requestFullscreen();
                    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();

                    // Redirect
                    setTimeout(() => {
                        window.location.href = 'home.html';
                    }, 500);
                };
            } else {
                width += Math.random() * 5;
                if (width > 100) width = 100;
                progressBar.style.width = width + '%';
                statusText.innerText = "LOADING... " + Math.floor(width) + "%";
            }
        }, 150);
    </script>
</body>
</html>
