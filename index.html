<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Thalappanth</title>
    <link rel="manifest" href="manifest.json">
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            display: flex; justify-content: center; align-items: center;
        }
        #gameCanvas {
            background-image: url('assets/loading-bg.png');
            background-size: cover;
            background-position: center;
            display: none; /* Initially hidden */
        }
        #rotateMessage {
            color: white; font-family: sans-serif; text-align: center;
            display: none; /* Only shows when in portrait */
        }
    </style>
</head>
<body>

    <div id="rotateMessage">
        <h2>Please Rotate Your Phone</h2>
        <p>Landscape mode is better for Thalappanth!</p>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const rotateMsg = document.getElementById('rotateMessage');
        const ctx = canvas.getContext('2d');

        function checkOrientation() {
            if (window.innerHeight > window.innerWidth) {
                // Portrait mode
                canvas.style.display = 'none';
                rotateMsg.style.display = 'block';
            } else {
                // Landscape mode
                canvas.style.display = 'block';
                rotateMsg.style.display = 'none';
                resizeCanvas();
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', checkOrientation);
        window.addEventListener('load', checkOrientation);

        function update() {
            // Future game logic goes here
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
