<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Thalappanth - Start</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Tap to Start Background - Using your new image */
        .loading-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            /* Using the absolute path to ensure it works with GitHub Pages */
            background: url('assets/image_12.png') no-repeat center center;
            background-size: cover;
            z-index: 1;
        }

        /* Tap overlay */
        .tap-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Darkens the image slightly to make text pop */
            display: flex; justify-content: center; align-items: center;
            z-index: 10;
            cursor: pointer;
            flex-direction: column;
        }

        /* Animated Text */
        .tap-text {
            color: #fff;
            font-family: 'Arial Black', sans-serif;
            font-size: 32px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.8);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>

    <div class="loading-bg"></div>

    <div class="tap-overlay" onclick="location.href='home.html'">
        <div class="tap-text">Tap to Start</div>
    </div>

</body>
</html>
