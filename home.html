<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Thalappanth - Home</title>
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Background Fix */
                   /* Fixed Background Section - Final Direct Link */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            /* Direct absolute link to your image on GitHub */
            background-image: url('https://raw.githubusercontent.com/reelsrundown-spec/-/main/assets/home-bg.jpg');
            background-position: center center;
            background-repeat: no-repeat;
            background-size: 100% 100%;
            z-index: -1;
            background-color: #0d1b2a; 
        }

        
        .ui-container {
            position: relative;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 15px 20px;
        }

        /* Top Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        .stat-item {
            background: rgba(0,0,0,0.8); border: 1.5px solid #444;
            border-radius: 8px; display: inline-flex; align-items: center;
            padding: 5px 12px; min-width: 90px; color: white; font-weight: bold;
            margin-right: 8px;
        }
        .lvl-badge {
            background: #8e44ad; width: 32px; height: 32px;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; border: 2px solid white; color: white; font-weight: bold;
        }

        /* Center Area */
        .center-area {
            flex-grow: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .avatar-circle {
            width: 150px; height: 150px; border-radius: 50%;
            border: 5px solid #f1c40f; background: rgba(0,0,0,0.3);
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 25px rgba(241, 196, 15, 0.5);
        }
        .name-tag {
            margin-top: 15px; background: #c0392b; color: white;
            padding: 8px 25px; border-radius: 8px; display: flex; align-items: center;
            box-shadow: 0 4px 0 #962d22; gap: 10px;
        }
        #p-name {
            background: none; border: none; color: white; font-weight: bold;
            font-size: 18px; text-transform: uppercase; text-align: center;
            outline: none; width: 120px;
        }

        /* Bottom Menu */
        .bottom-nav { display: flex; justify-content: space-around; align-items: flex-end; padding-bottom: 15px; }
        .play-btn {
            background: #27ae60; color: white; border: none;
            padding: 12px 65px; border-radius: 40px; font-size: 28px;
            font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 #1e8449;
            transition: 0.1s;
        }
        .play-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #1e8449; }
        .nav-btn { 
            background: #34495e; border: none; padding: 10px 18px; 
            border-radius: 10px; color: white; font-weight: bold;
            box-shadow: 0 4px 0 #2c3e50; min-width: 80px;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="ui-container">
        <div class="top-bar">
            <div>
                <div class="stat-item">💰 1,000</div>
                <div class="stat-item">💎 35</div>
            </div>
            <div class="lvl-badge">profile</div>
            <div style="font-size: 24px; color: #7f8c8d; cursor: pointer;">⚙️</div>
        </div>

        <div class="center-area">
            <div class="avatar-circle">
                <div style="font-size: 60px;">👤</div>
            </div>
            <div class="name-tag">
                <input type="text" id="p-name" value="STARK" maxlength="10">
                <span onclick="document.getElementById('p-name').focus()" style="cursor:pointer">✏️</span>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn">STORE</button>
            <button class="play-btn" onclick="location.href='game.html'">PLAY</button>
            <button class="nav-btn">RANK</button>
            <button class="nav-btn">MODE</button>
        </div>
    </div>

    <script>
        // Fullscreen logic
        function openFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        }
        document.addEventListener("click", openFullscreen, { once: true });
    </script>
</body>
</html>
