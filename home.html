<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Thalappanth - Home</title>
    <style>
body, html {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    background-size: 100% 100% !important; /* Force background to edges */
    position: fixed; /* Prevents scrolling/bouncing */
}
        
/* Container to ensure UI elements respect the safe area (notch) */
.main-wrapper {
    width: 100%;
    height: 100%;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    box-sizing: border-box;
}
        
        /* Top Bar Section */
        .top-bar {
            position: absolute; top: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; box-sizing: border-box;
            background: rgba(0,0,0,0.5); z-index: 10;
        }

        .stats-group { display: flex; gap: 12px; }

        .stat-item {
            background: rgba(0,0,0,0.7); border: 2px solid #444;
            border-radius: 10px; display: flex; align-items: center;
            padding: 5px 15px; min-width: 110px; font-weight: bold;
        }

        .btn-plus {
            background: #2ecc71; border: none; color: white;
            margin-left: auto; border-radius: 4px; padding: 0 8px;
            font-weight: bold; cursor: pointer;
        }

        .level-badge {
            background: #8e44ad; width: 35px; height: 35px;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; border: 2px solid white; font-weight: bold;
        }

        /* Center Character Area */
        .character-zone {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        /* Avatar Placeholder since you're not adding player.png now */
        .avatar-placeholder {
            width: 160px; height: 160px; border-radius: 50%;
            border: 6px solid #f1c40f; background: rgba(255,255,255,0.1);
            display: flex; justify-content: center; align-items: center;
            font-size: 80px; box-shadow: 0 0 30px rgba(241, 196, 15, 0.4);
        }

        /* Editable Name Styling */
        .name-wrapper {
            margin-top: 20px; display: flex; align-items: center;
            background: #c0392b; padding: 10px 25px; border-radius: 8px;
            box-shadow: 0 5px 0 #962d22; gap: 12px;
        }

        #p-name-input {
            background: none; border: none; color: white;
            font-weight: bold; font-size: 20px; text-transform: uppercase;
            text-align: center; outline: none; width: 140px;
        }

        .edit-pencil { cursor: pointer; font-size: 18px; filter: grayscale(1); transition: 0.2s; }
        .edit-pencil:hover { filter: grayscale(0); transform: scale(1.2); }

        /* Bottom Menu */
        .bottom-nav {
            position: absolute; bottom: 0; width: 100%;
            display: flex; justify-content: space-around; align-items: center;
            padding: 20px; box-sizing: border-box; background: rgba(0,0,0,0.4);
        }

        .btn-play {
            background: #27ae60; color: white; border: none;
            padding: 12px 80px; border-radius: 45px; font-size: 32px;
            font-weight: 900; cursor: pointer; letter-spacing: 2px;
            box-shadow: 0 7px 0 #1e8449; transition: 0.1s;
        }

        .btn-play:active { transform: translateY(4px); box-shadow: 0 3px 0 #1e8449; }

        .btn-nav {
            background: #34495e; border: none; padding: 12px 25px;
            border-radius: 12px; color: white; font-weight: bold;
            box-shadow: 0 4px 0 #2c3e50; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="stats-group">
            <div class="stat-item">💰 20,380 <button class="btn-plus">+</button></div>
            <div class="stat-item">💎 35 <button class="btn-plus">+</button></div>
        </div>
        <div class="level-badge">7</div>
        <div style="font-size: 26px; cursor: pointer;">⚙️</div>
    </div>

    <div class="character-zone">
        <div class="avatar-placeholder">👤</div>
        
        <div class="name-wrapper">
            <input type="text" id="p-name-input" value="LOADING..." maxlength="12">
            <span class="edit-pencil" onclick="document.getElementById('p-name-input').focus()">✏️</span>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="btn-nav">Store</button>
        <button class="btn-play" onclick="location.href='game.html'">PLAY</button>
        <button class="btn-nav">Rank</button>
    </div>
        <div class="bottom-nav">
        <button class="nav-btn">SHOP</button>
        <button class="play-btn" onclick="location.href='game.html'">PLAY</button>
        <button class="nav-btn">RANK</button>
    </div>

    <script>
        function openFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }

        // Triggers fullscreen on the first interaction
        document.addEventListener("click", openFullscreen, { once: true });

        // Your other random name generator code can also stay here
        const names = ["STARK", "ZODX", "THALA", "KICKER", "PRO_07"];
        window.onload = () => {
            document.getElementById('p-name').value = names[Math.floor(Math.random() * names.length)];
        };
    </script>
</body>
</html>
