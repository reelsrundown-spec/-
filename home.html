<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Thalappanth - Home</title>
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #000; /* Fallback color */
        }

        /* Full Screen Background Fix */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('assets/home-bg.jpg') no-repeat center center;
            background-size: 100% 100%;
            z-index: -1;
        }

        .ui-container {
            position: relative;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 10px 20px;
        }

        /* Top Bar */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
        }

        .stat-item {
            background: rgba(0,0,0,0.7); border: 2px solid #444;
            border-radius: 8px; display: inline-flex; align-items: center;
            padding: 5px 12px; min-width: 100px; color: white; font-weight: bold;
            margin-right: 10px;
        }

        .lvl-badge {
            background: #8e44ad; width: 35px; height: 35px;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; border: 2px solid white; color: white; font-weight: bold;
        }

        /* Center Area */
        .center-area {
            flex-grow: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .avatar-circle {
            width: 160px; height: 160px; border-radius: 50%;
            border: 5px solid #f1c40f; background: rgba(255,255,255,0.1);
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
        }

        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; }

        .name-tag {
            margin-top: 15px; background: #c0392b; color: white;
            padding: 8px 25px; border-radius: 8px; display: flex; align-items: center;
            box-shadow: 0 4px 0 #962d22; gap: 10px;
        }

        #p-name {
            background: none; border: none; color: white; font-weight: bold;
            font-size: 18px; text-transform: uppercase; text-align: center;
            outline: none; width: 120px;
        }

        /* Bottom Menu */
        .bottom-nav {
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: 10px;
        }

        .play-btn {
            background: #27ae60; color: white; border: none;
            padding: 12px 60px; border-radius: 40px; font-size: 28px;
            font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 #1e8449;
        }

        .nav-btn { background: #34495e; border: none; padding: 12px 20px; border-radius: 12px; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="ui-container">
        <div class="top-bar">
            <div>
                <div class="stat-item">💰 20,380</div>
                <div class="stat-item">💎 35</div>
            </div>
            <div class="lvl-badge">7</div>
            <div style="font-size: 24px; color: white;">⚙️</div>
        </div>

        <div class="center-area">
            <div class="avatar-circle">
                <img src="assets/player.png" alt="" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0iIzM0OThkYiI+PHBhdGggZD0iTTEyIDJDNi40OCAyIDIgNi40OCAyIDEyczQuNDggMTAgMTAgMTAgMTAtNC40OCAxMC0xMFMxNy41MiAyIDEyIDJ6bTAgM2MzLjMxIDAgNiAyLjY5IDYgNnMtMi42OSA2LTYgNi02LTIuNjktNi02IDIuNjktNiA2LTZ6bTAgMTQuNmMtMi45NyAwLTUuNjEtMS4zMy03LjM0LTMuNCAuMDQtMi40MyA0Ljg0LTMuNyA3LjM0LTMuN3MyLjMzIDEuMjYgNy4zNCAzLjdjLTEuNzMgMi4wNy00LjM3IDMuNC03LjM0IDMuNHoiLz48L3N2Zz4='">
            </div>
            <div class="name-tag">
                <input type="text" id="p-name" value="LOADING..." maxlength="10">
                <span onclick="document.getElementById('p-name').focus()" style="cursor:pointer">✏️</span>
            </div>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn">STORE</button>
            <button class="play-btn" onclick="location.href='game.html'">PLAY</button>
            <button class="nav-btn">RANK</button>
        </div>
    </div>

    <script>
        function openFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        }
        document.addEventListener("click", openFullscreen, { once: true });

        window.onload = () => {
            const names = ["STARK", "ZODX", "THALA", "SHADOW", "PRO_07"];
            document.getElementById('p-name').value = names[Math.floor(Math.random() * names.length)];
        };
    </script>
</body>
</html>
